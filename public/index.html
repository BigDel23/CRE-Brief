<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CRE Daily Brief</title>

  <meta name="theme-color" content="#08202F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CRE Brief">

  <link rel="manifest" href="/manifest.json">

  <!-- Browser favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    html,body{background:#08202F}
    #cre-root{padding-top:max(18px,env(safe-area-inset-top))!important;padding-bottom:max(18px,env(safe-area-inset-bottom))!important}
    .btn-ghost.armed{color:#F2B441;border-color:#7A5A1E}
  </style>
</head>
<body>
<style>
  :root{
    --field:#08202F;
    --surface:#0D2C40;
    --surface-2:#123A53;
    --line:#2A5C7A;
    --line-soft:#1A4661;
    --print:#E9F3F8;
    --dim:#8DB0C4;
    --dimmer:#5E88A0;
    --pencil:#F2B441;
    --pencil-deep:#7A5A1E;
    --redline:#E0654B;

    --display:'Barlow Condensed','Oswald','Arial Narrow',sans-serif;
    --body:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
    --data:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  }

  *{box-sizing:border-box;margin:0;padding:0}

  #cre-root{
    font-family:var(--body);
    color:var(--print);
    background:
linear-gradient(rgba(5,18,28,.72), rgba(5,18,28,.72)),
url("https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=2200&q=80");

background-size:cover;
background-position:center;
background-attachment:fixed;
    min-height:100vh;
    padding:18px;
    font-size:14px;
    line-height:1.5;
  }
  #cre-root::selection,#cre-root ::selection{background:var(--pencil);color:var(--field)}

  .sheet{max-width:1180px;margin:0 auto}

  /* ── Titleblock ─────────────────────────────── */
  .titleblock{
    border:1px solid var(--line);
    background:var(--surface);
    display:grid;
    grid-template-columns:minmax(230px,1.4fr) repeat(4,1fr) auto;
  }
  .tb-cell{
    border-left:1px solid var(--line-soft);
    padding:10px 12px;
    min-width:0;
  }
  .tb-cell:first-child{border-left:0}
  .tb-label{
    font-family:var(--display);
    text-transform:uppercase;
    letter-spacing:.14em;
    font-size:10px;
    color:var(--dimmer);
    display:block;
    margin-bottom:3px;
  }
  .tb-value{font-family:var(--data);font-size:15px;font-weight:500;letter-spacing:-.01em}
  .tb-note{font-size:10.5px;color:var(--dim);margin-top:2px;line-height:1.35}
  .tb-title{
    font-family:var(--display);
    font-size:30px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.02em;
    line-height:1;
  }
  .tb-sub{font-family:var(--data);font-size:11px;color:var(--dim);margin-top:5px;letter-spacing:.02em}
  .tb-actions{display:flex;align-items:center;gap:8px;padding:10px 12px;border-left:1px solid var(--line-soft)}

  button{font-family:var(--display);cursor:pointer;border-radius:0}
  .btn{
    background:var(--pencil);
    color:#1A1204;
    border:1px solid var(--pencil);
    padding:8px 16px;
    font-size:13px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.1em;
    transition:transform .08s ease, filter .15s ease;
    white-space:nowrap;
  }
  .btn:hover{filter:brightness(1.12)}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{background:transparent;color:var(--dimmer);border-color:var(--line);cursor:wait}
  .btn-ghost{
    background:transparent;color:var(--dim);border:1px solid var(--line);
    padding:8px 12px;font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;
  }
  .btn-ghost:hover{color:var(--print);border-color:var(--dim)}
  :focus-visible{outline:2px solid var(--pencil);outline-offset:2px}

  /* ── Body grid ──────────────────────────────── */
  .plan{display:grid;grid-template-columns:212px 1fr;gap:18px;margin-top:18px;align-items:start}

  /* ── Stack rail (signature) ─────────────────── */
  .rail{position:sticky;top:18px}
  .rail-head{
    font-family:var(--display);text-transform:uppercase;letter-spacing:.14em;
    font-size:10px;color:var(--dimmer);margin-bottom:8px;
    display:flex;justify-content:space-between;
  }
  .tower{border:1px solid var(--line);border-bottom-width:3px;background:var(--surface);display:flex;flex-direction:column}
  .floor{
    display:grid;grid-template-columns:26px 1fr;align-items:center;
    border-bottom:1px solid var(--line-soft);
    background:transparent;color:var(--dim);
    text-align:left;width:100%;padding:0;
    transition:background .15s ease,color .15s ease;
  }
  .tower .floor:first-child{border-bottom:1px solid var(--line-soft)}
  .tower .floor:last-child{border-bottom:0}
  .floor-num{
    font-family:var(--data);font-size:9px;color:var(--dimmer);
    text-align:center;border-right:1px solid var(--line-soft);
    align-self:stretch;display:flex;align-items:center;justify-content:center;
  }
  .floor-band{
    font-family:var(--display);text-transform:uppercase;letter-spacing:.08em;
    font-size:12px;padding:7px 9px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    background:repeating-linear-gradient(45deg,transparent 0 5px,var(--line-soft) 5px 6px);
  }
  .floor.leased .floor-band{background:rgba(242,180,65,.16);color:var(--pencil)}
  .floor.podium .floor-band{background:rgba(233,243,248,.07);color:var(--dim)}
  .floor:hover .floor-band{color:var(--print);background:rgba(233,243,248,.14)}
  .floor.leased:hover .floor-band{background:rgba(242,180,65,.3);color:var(--pencil)}
  .floor.pulling .floor-band{animation:scan 1.1s linear infinite;color:var(--print)}
  @keyframes scan{
    from{background-position:0 0}
    to{background-position:16px 0}
  }
  .grade{
    border-top:1px solid var(--line);margin-top:2px;padding-top:5px;
    display:flex;justify-content:space-between;
    font-family:var(--data);font-size:9px;color:var(--dimmer);letter-spacing:.04em;
  }

  /* ── Site (local market) — the ground the stack sits on ── */
  .grade-line{
    height:0;border-top:2px solid var(--pencil-deep);
    position:relative;flex:none;
  }
  .grade-line::after{
    content:'GRADE';position:absolute;right:4px;top:2px;
    font-family:var(--data);font-size:7.5px;color:var(--pencil-deep);letter-spacing:.12em;
  }
  .floor.site .floor-band{
    background:repeating-linear-gradient(-45deg,rgba(242,180,65,.05) 0 4px,rgba(242,180,65,.13) 4px 8px);
    color:var(--dim);
  }
  .floor.site.leased .floor-band{
    background:repeating-linear-gradient(-45deg,rgba(242,180,65,.18) 0 4px,rgba(242,180,65,.34) 4px 8px);
    color:var(--pencil);
  }
  .floor.site .floor-num{color:var(--pencil-deep)}

  .fund{
    display:grid;grid-template-columns:repeat(4,1fr);
    border-bottom:1px solid var(--line-soft);background:rgba(8,32,47,.5);
  }
  .fund > div{padding:8px 10px;border-left:1px solid var(--line-soft);min-width:0}
  .fund > div:first-child{border-left:0}
  .fund .tb-value{font-size:13px}

  .locbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:10px 12px;border-bottom:1px solid var(--line-soft)}
  .locbar .hint{font-size:11.5px;color:var(--dimmer);flex:1;min-width:160px}
  .locbar input{
    background:var(--field);border:1px solid var(--line);color:var(--print);
    font-family:var(--body);font-size:12.5px;padding:6px 9px;min-width:150px;flex:1;
  }
  .locbar input:focus{outline:none;border-color:var(--dim)}
  .fix{font-family:var(--data);font-size:10px;color:var(--pencil);letter-spacing:.03em}
  .legend{margin-top:14px;display:flex;flex-direction:column;gap:6px}
  .legend div{display:flex;align-items:center;gap:7px;font-size:10.5px;color:var(--dimmer)}
  .swatch{width:16px;height:10px;border:1px solid var(--line);flex:none}
  .swatch.on{background:rgba(242,180,65,.4);border-color:var(--pencil-deep)}
  .swatch.off{background:repeating-linear-gradient(45deg,transparent 0 3px,var(--line) 3px 4px)}

  /* ── Content column ─────────────────────────── */
  .col{display:flex;flex-direction:column;gap:18px;min-width:0}
  .sect-rule{
    display:flex;align-items:baseline;gap:12px;
    border-bottom:1px solid var(--line);padding-bottom:6px;margin-bottom:2px;
  }
  .sect-rule h2{
    font-family:var(--display);text-transform:uppercase;letter-spacing:.1em;
    font-size:15px;font-weight:600;color:var(--print);
  }
  .sect-rule span{font-family:var(--data);font-size:10px;color:var(--dimmer);margin-left:auto}

  .card{border:1px solid var(--line);background:var(--surface);scroll-margin-top:18px}
  .card-head{
    display:flex;align-items:center;gap:10px;
    padding:9px 12px;border-bottom:1px solid var(--line-soft);
    background:var(--surface-2);
  }
  .card-head h3{
    font-family:var(--display);text-transform:uppercase;letter-spacing:.09em;
    font-size:14px;font-weight:600;
  }
  .card-head .meta{margin-left:auto;font-family:var(--data);font-size:10px;color:var(--dimmer)}
  .drop{
    background:transparent;border:1px solid var(--line);color:var(--dimmer);
    font-family:var(--data);font-size:11px;padding:1px 6px;line-height:1.4;
  }
  .drop:hover{color:var(--redline);border-color:var(--redline)}

  .item{padding:11px 12px;border-bottom:1px solid var(--line-soft);display:grid;grid-template-columns:1fr;gap:3px}
  .item:last-child{border-bottom:0}
  .item h4{font-size:14px;font-weight:600;line-height:1.35;letter-spacing:-.005em}
  .item p{font-size:12.5px;color:var(--dim);line-height:1.5}
  .why{
    font-size:11.5px;color:var(--pencil);
    border-left:2px solid var(--pencil-deep);padding-left:8px;margin-top:4px;
  }
  .foot{display:flex;gap:10px;align-items:center;margin-top:5px;flex-wrap:wrap}
  .tag{
    font-family:var(--display);text-transform:uppercase;letter-spacing:.1em;
    font-size:9.5px;color:var(--field);background:var(--dim);padding:1px 6px;
  }
  .tag.deal{background:var(--pencil)}
  .tag.capital{background:#7FD1AE}
  .tag.leasing{background:#9EC5E8}
  .tag.earnings{background:#E0A0C8}
  .src{font-family:var(--data);font-size:10px;color:var(--dimmer);text-decoration:none;border-bottom:1px dotted var(--line)}
  .src:hover{color:var(--pencil);border-color:var(--pencil)}

  .pending{padding:14px 12px;font-family:var(--data);font-size:11px;color:var(--dimmer)}
  .pending::after{content:'';animation:dots 1.4s steps(4,end) infinite}
  @keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
  .quiet{padding:14px 12px;font-size:12.5px;color:var(--dimmer)}
  .err{padding:12px;font-size:12.5px;color:var(--redline);border-left:2px solid var(--redline)}

  /* ── Watchlist editor ───────────────────────── */
  .add{display:flex;gap:0;margin-top:2px}
  .add input{
    flex:1;background:var(--field);border:1px solid var(--line);border-right:0;
    color:var(--print);font-family:var(--body);font-size:13px;padding:8px 10px;
  }
  .add input::placeholder{color:var(--dimmer)}
  .add input:focus{outline:none;border-color:var(--dim)}
  .add input:focus-visible{outline:2px solid var(--pencil);outline-offset:-2px}

  /* ── Empty state ────────────────────────────── */
  .empty{border:1px dashed var(--line);padding:36px 24px;text-align:center;background:var(--surface)}
  .empty h3{font-family:var(--display);text-transform:uppercase;letter-spacing:.1em;font-size:18px;margin-bottom:6px}
  .empty p{color:var(--dim);font-size:13px;max-width:44ch;margin:0 auto 16px}

  @media (max-width:860px){
    #cre-root{padding:10px}
    .titleblock{grid-template-columns:1fr 1fr}
    .tb-cell:nth-child(1){grid-column:1/-1;border-bottom:1px solid var(--line-soft)}
    .tb-cell:nth-child(2),.tb-cell:nth-child(4){border-left:0}
    .tb-cell:nth-child(4),.tb-cell:nth-child(5){border-top:1px solid var(--line-soft)}
    .tb-actions{grid-column:1/-1;border-left:0;border-top:1px solid var(--line-soft)}
    .btn{flex:1}
    .plan{grid-template-columns:1fr}
    .rail{position:static}
    .tower{flex-direction:row;overflow-x:auto;border-bottom-width:1px;border-right-width:3px}
    .floor{grid-template-columns:1fr;border-bottom:0;border-right:1px solid var(--line-soft);flex:none}
    .floor-num{display:none}
    .legend{flex-direction:row;gap:14px;flex-wrap:wrap}
    .grade{display:none}
    .fund{grid-template-columns:1fr 1fr}
    .fund > div:nth-child(3){border-left:0}
    .fund > div:nth-child(n+3){border-top:1px solid var(--line-soft)}
    .grade-line{border-top:0;border-left:2px solid var(--pencil-deep);height:auto;width:0}
    .grade-line::after{display:none}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
  /* ─────────────────────────────────────────────
   BLOOMBERG TERMINAL — MODERN POLISH
───────────────────────────────────────────── */

/* Core modules */
.titleblock,
.card,
.empty,
.tower {
  background:
    linear-gradient(
      145deg,
      rgba(14, 48, 69, 0.94),
      rgba(7, 29, 43, 0.92)
    );

  border: 1px solid rgba(103, 167, 202, 0.48);

  box-shadow:
    0 22px 55px rgba(0, 0, 0, 0.42),
    0 6px 16px rgba(0, 0, 0, 0.24),
    inset 0 1px 0 rgba(255, 255, 255, 0.045);

  backdrop-filter: blur(14px) saturate(115%);
  -webkit-backdrop-filter: blur(14px) saturate(115%);
}

/* Restrained modern corners */
.titleblock,
.card,
.empty {
  border-radius: 8px;
  overflow: hidden;
}

.tower {
  border-radius: 6px;
  overflow: hidden;
}

/* Stronger top terminal bar */
.titleblock {
  position: relative;

  box-shadow:
    0 28px 65px rgba(0, 0, 0, 0.48),
    0 8px 20px rgba(0, 0, 0, 0.26),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

/* Fine amber line under top bar */
.titleblock::after {
  content: "";
  position: absolute;
  left: 18px;
  right: 18px;
  bottom: 0;
  height: 1px;

  background:
    linear-gradient(
      90deg,
      transparent,
      rgba(242, 180, 65, 0.7),
      transparent
    );
}

/* Market cells */
.tb-cell {
  background:
    linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.018),
      rgba(255, 255, 255, 0)
    );

  transition:
    background-color 0.18s ease,
    box-shadow 0.18s ease;
}

.tb-cell:hover {
  background: rgba(255, 255, 255, 0.035);

  box-shadow:
    inset 0 -2px 0 rgba(242, 180, 65, 0.35);
}

.tb-value {
  color: #f5f9fc;
  text-shadow: 0 0 18px rgba(134, 196, 228, 0.12);
}

/* Empty-state hero module */
.empty {
  position: relative;
  padding: 44px 28px;

  background:
    linear-gradient(
      135deg,
      rgba(14, 51, 73, 0.93),
      rgba(8, 34, 51, 0.91)
    );

  box-shadow:
    0 26px 65px rgba(0, 0, 0, 0.42),
    inset 0 1px 0 rgba(255, 255, 255, 0.04);
}

.empty::before {
  content: "";
  position: absolute;
  inset: 0;

  background:
    linear-gradient(
      120deg,
      transparent 0%,
      rgba(255, 255, 255, 0.035) 45%,
      transparent 70%
    );

  pointer-events: none;
}

.empty h3 {
  position: relative;
  letter-spacing: 0.14em;
  text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
}

.empty p {
  position: relative;
}

/* Story and data cards */
.card {
  position: relative;

  transition:
    transform 0.2s ease,
    box-shadow 0.2s ease,
    border-color 0.2s ease;
}

.card::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 2px;

  background:
    linear-gradient(
      180deg,
      rgba(242, 180, 65, 0.85),
      rgba(42, 92, 122, 0.15)
    );

  opacity: 0.55;
}

.card:hover {
  transform: translateY(-3px);

  border-color: rgba(132, 196, 228, 0.78);

  box-shadow:
    0 30px 70px rgba(0, 0, 0, 0.48),
    0 8px 20px rgba(0, 0, 0, 0.28),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

/* Card headers */
.card-head {
  background:
    linear-gradient(
      180deg,
      rgba(26, 78, 107, 0.96),
      rgba(15, 54, 78, 0.96)
    );

  padding: 12px 14px;

  box-shadow:
    inset 0 -1px 0 rgba(255, 255, 255, 0.035),
    0 7px 18px rgba(0, 0, 0, 0.18);
}

.card-head h3 {
  color: #f2f7fa;
  letter-spacing: 0.11em;
}

/* Individual news rows */
.item {
  padding: 15px 16px;

  transition:
    background-color 0.16s ease,
    padding-left 0.16s ease;
}

.item:hover {
  background: rgba(255, 255, 255, 0.025);
  padding-left: 19px;
}

.item h4 {
  color: #f2f7fa;
  line-height: 1.4;
}

.item p {
  color: #9db9c9;
}

/* Watchlist tower */
.tower {
  box-shadow:
    0 24px 55px rgba(0, 0, 0, 0.42),
    0 6px 16px rgba(0, 0, 0, 0.24);
}

.floor {
  transition:
    transform 0.16s ease,
    background-color 0.16s ease,
    border-color 0.16s ease;
}

.floor:hover {
  transform: translateX(4px);
}

.floor-band {
  transition:
    color 0.16s ease,
    background-color 0.16s ease,
    padding-left 0.16s ease;
}

.floor:hover .floor-band {
  padding-left: 12px;
}

/* Buttons */
.btn,
.btn-ghost,
.drop {
  border-radius: 4px;

  transition:
    transform 0.14s ease,
    box-shadow 0.14s ease,
    filter 0.14s ease,
    color 0.14s ease,
    border-color 0.14s ease,
    background-color 0.14s ease;
}

.btn {
  box-shadow:
    0 9px 22px rgba(0, 0, 0, 0.3),
    inset 0 1px 0 rgba(255, 255, 255, 0.22);
}

.btn:hover {
  transform: translateY(-2px);

  box-shadow:
    0 14px 30px rgba(0, 0, 0, 0.38),
    inset 0 1px 0 rgba(255, 255, 255, 0.24);
}

.btn:active {
  transform: translateY(0);
}

.btn-ghost {
  background: rgba(4, 20, 31, 0.24);
}

.btn-ghost:hover {
  transform: translateY(-1px);

  background: rgba(255, 255, 255, 0.035);

  box-shadow:
    0 10px 24px rgba(0, 0, 0, 0.24);
}

/* Inputs */
.locbar input,
.add input {
  background: rgba(5, 25, 38, 0.82);

  border-color: rgba(92, 151, 184, 0.5);

  box-shadow:
    inset 0 3px 10px rgba(0, 0, 0, 0.34),
    0 1px 0 rgba(255, 255, 255, 0.025);

  transition:
    border-color 0.16s ease,
    box-shadow 0.16s ease,
    background-color 0.16s ease;
}

.locbar input:focus,
.add input:focus {
  background: rgba(7, 31, 46, 0.94);

  border-color: rgba(242, 180, 65, 0.75);

  box-shadow:
    inset 0 3px 10px rgba(0, 0, 0, 0.28),
    0 0 0 2px rgba(242, 180, 65, 0.12),
    0 0 24px rgba(242, 180, 65, 0.08);
}

/* Section headings */
.sect-rule {
  border-bottom-color: rgba(104, 167, 201, 0.42);
}

.sect-rule h2 {
  text-shadow: 0 2px 12px rgba(0, 0, 0, 0.38);
}

/* Active notification state */
.btn-ghost.armed {
  background: rgba(242, 180, 65, 0.08);

  box-shadow:
    0 0 0 1px rgba(242, 180, 65, 0.1),
    0 0 22px rgba(242, 180, 65, 0.1);
}

/* Scrollbar */
#cre-root {
  scrollbar-color: rgba(92, 151, 184, 0.65) rgba(4, 20, 31, 0.5);
}

#cre-root ::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

#cre-root ::-webkit-scrollbar-track {
  background: rgba(4, 20, 31, 0.5);
}

#cre-root ::-webkit-scrollbar-thumb {
  background: rgba(92, 151, 184, 0.55);
  border: 2px solid rgba(4, 20, 31, 0.8);
  border-radius: 10px;
}

#cre-root ::-webkit-scrollbar-thumb:hover {

<script>
(function(){
  const MACRO_SECTIONS = [
    "Rates & debt",
    "Capital markets",
    "Office",
    "Industrial & data centers",
    "Multifamily & retail"
  ];
  const DEFAULT_FIRMS = ["CBRE","JLL","Blackstone Real Estate","Prologis","Hines"];
  const KEY_WATCH = "cre-stack:watchlist";
  const KEY_BRIEF = "cre-stack:brief";
  const KEY_MARKET = "cre-stack:market";

  const today = new Date();
  const dateISO = today.toISOString().slice(0,10);
  const dateLong = today.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  let state = {
    watchlist:[...DEFAULT_FIRMS], macro:null, firms:{}, pulse:[], running:false,
    // local: geo = {lat,lng} from the browser; override = market the user typed;
    // status = idle | locating | pulling | done | error | blocked
    local:{ status:"idle", geo:null, override:null, market:null, submarket:null, items:[], fundamentals:[], msg:"" }
  };

  const $ = id => document.getElementById(id);
  const esc = s => String(s??"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const slug = s => s.toLowerCase().replace(/[^a-z0-9]+/g,'-');

  /* ── storage ─────────────────────────────── */
  async function load(key){
    try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch(e){ return null; }
  }
  async function save(key,val){
    try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){}
    if(window.syncSub) window.syncSub();
  }

  /* ── model call ──────────────────────────── */
  async function ask(prompt){
    const res = await fetch("/api/ask",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt})
    });
    if(!res.ok) throw new Error("Request failed (" + res.status + ")");
    const { text } = await res.json();
    return parseJSON(text);
  }
  function parseJSON(text){
    let t = text.replace(/```json/g,"").replace(/```/g,"").trim();
    const a = t.indexOf("{"), b = t.lastIndexOf("}");
    if(a === -1 || b === -1) throw new Error("No results came back in a readable shape.");
    return JSON.parse(t.slice(a,b+1));
  }

  /* ── prompts ─────────────────────────────── */
  function macroPrompt(){
    return `Today is ${dateLong}. Search the web for the latest commercial real estate news and market data from the past 48 hours. Cover: Treasury yields and Fed policy, CRE debt/CMBS/lending conditions, transaction volume and cap rates, and sector news across office, industrial, data centers, multifamily and retail.

Brief a commercial real estate professional. Prioritize what moved and what is actionable. Use real, current figures from your search.

Return ONLY a JSON object, no prose, no markdown:
{"pulse":[{"value":"4.28%","note":"+6bps on the week"},{"value":"4.33%","note":"flat"},{"value":"AAA +82","note":"tightening"},{"value":"Stable","note":"industrial 5.5-6.0%"}],
"sections":[{"title":"Rates & debt","items":[{"headline":"short factual headline","detail":"25 words max on what happened, with figures","why":"12 words max on what it means for CRE","source":"outlet name","url":"https://..."}]}]}

"pulse" must have exactly 4 entries in this order: 10Y Treasury, SOFR, CMBS spreads, cap rate direction.
"sections" must be exactly these 5 titles in this order: ${MACRO_SECTIONS.map(s=>'"'+s+'"').join(", ")}. Give 1-2 items each. If a sector had no real news, return an empty items array rather than filler.`;
  }
  function localPrompt(){
    const L = state.local;
    const where = L.override
      ? `The user's market is "${L.override}".`
      : `The user is at latitude ${L.geo.lat.toFixed(4)}, longitude ${L.geo.lng.toFixed(4)}. First identify the metro area and the specific CRE submarket those coordinates fall in.`;

    return `Today is ${dateLong}. ${where}

Search the web for commercial real estate news and market data specific to that metro from the past 14 days: notable sales and acquisitions, major leases, new development and entitlements, and market fundamentals. Use the metro's real CRE vocabulary and named submarkets.

Return ONLY a JSON object, no prose, no markdown:
{"market":"Metro name, ST","submarket":"nearest CRE submarket name",
"fundamentals":[{"value":"18.4%","note":"office vacancy, Q2"},{"value":"$34.10","note":"office asking, NNN"},{"value":"5.2%","note":"industrial vacancy"},{"value":"2.1M SF","note":"under construction"}],
"items":[{"headline":"short factual headline","detail":"30 words max with price, PSF, address, buyer/seller or tenant","date":"Jul 12","tag":"deal","source":"outlet name","url":"https://..."}]}

"market" must be the real metro name, never coordinates. "fundamentals" must have exactly 4 entries in this order: office vacancy, office asking rent, industrial vacancy, construction pipeline — with the metro's actual current figures from your search. Give up to 5 items, newest first. "tag" must be one of: deal, capital, leasing, development, other. Only include real news with a working source URL. If the metro is small and has little CRE coverage, widen to the nearest major metro and say so in "market". Never invent a story.`;
  }

  function firmPrompt(firm){
    return `Today is ${dateLong}. Search the web for news about the commercial real estate firm "${firm}" from the past 7 days — acquisitions, dispositions, financings, fund closes, leasing, earnings, and leadership changes.

Return ONLY a JSON object, no prose, no markdown:
{"items":[{"headline":"short factual headline","detail":"30 words max, with deal size, asset, market and counterparty where known","date":"Jul 14","tag":"deal","source":"outlet name","url":"https://..."}]}

Up to 3 items, newest first. "tag" must be one of: deal, capital, leasing, earnings, people, other. Only include real news you found in search results with a working source URL. If there is nothing from the past 7 days, return {"items":[]}. Never invent a story.`;
  }

  /* ── location ────────────────────────────── */
  // Asked fresh on every pull so the brief follows you if you travel.
  // The browser only prompts once; after that it answers silently.
  function locate(){
    return new Promise(resolve=>{
      if(!navigator.geolocation){
        return resolve({ok:false,msg:"This browser doesn't offer location."});
      }
      let settled = false;
      const done = r => { if(!settled){ settled = true; resolve(r); } };
      setTimeout(()=>done({ok:false,msg:"Location took too long to answer."}), 12000);

      navigator.geolocation.getCurrentPosition(
        p => done({ok:true, lat:p.coords.latitude, lng:p.coords.longitude}),
        e => {
          const msg = e.code === 1 ? "Location permission is off."
                    : e.code === 2 ? "Your position isn't available right now."
                    : "Location timed out.";
          done({ok:false, msg});
        },
        {enableHighAccuracy:false, timeout:11000, maximumAge:300000}
      );
    });
  }

  async function pullLocal(){
    const L = state.local;

    if(!L.override){
      L.status = "locating"; L.msg = ""; render();
      const pos = await locate();
      if(pos.ok){
        L.geo = {lat:pos.lat, lng:pos.lng};
      } else {
        L.status = "blocked";
        L.msg = pos.msg + " Type your market below and the local floor will fill in.";
        render(); return;
      }
    }

    L.status = "pulling"; render();
    try{
      const d = await ask(localPrompt());
      L.market = d.market || L.override || "Your market";
      L.submarket = d.submarket || "";
      L.items = Array.isArray(d.items) ? d.items : [];
      L.fundamentals = Array.isArray(d.fundamentals) ? d.fundamentals : [];
      L.status = "done";
      await save(KEY_MARKET, {override:L.override, market:L.market});
    }catch(e){
      L.status = "error";
      L.msg = "The local pull came back empty: " + e.message;
    }
    render();
  }

  /* ── rail ────────────────────────────────── */
  function renderRail(){
    const floors = [];
    state.watchlist.forEach(f=>{
      const rec = state.firms[f];
      floors.push({
        label:f, target:"firm-"+slug(f),
        cls: rec?.status==="pulling" ? "pulling" : (rec?.items?.length ? "leased" : "")
      });
    });
    floors.reverse();
    MACRO_SECTIONS.slice().reverse().forEach(s=>{
      const has = state.macro?.sections?.find(x=>x.title===s)?.items?.length;
      floors.push({ label:s, target:"macro-"+slug(s), cls:"podium" + (has?" leased":"") });
    });

    const n = floors.length;
    let html = floors.map((f,i)=>`
      <button class="floor ${f.cls}" data-t="${f.target}" title="${esc(f.label)}">
        <span class="floor-num">${n-i}</span>
        <span class="floor-band">${esc(f.label)}</span>
      </button>`).join("");

    // Below grade: your local market is the ground everything else sits on.
    const L = state.local;
    const siteLabel = L.market ? L.market : "Site — locate me";
    const siteCls = "site" + (L.items.length ? " leased" : "")
                  + (["locating","pulling"].includes(L.status) ? " pulling" : "");
    html += `<div class="grade-line"></div>
      <button class="floor ${siteCls}" data-t="local" title="${esc(siteLabel)}">
        <span class="floor-num">G</span>
        <span class="floor-band">${esc(siteLabel)}</span>
      </button>`;

    $("tower").innerHTML = html;

    const active = floors.filter(f=>f.cls.includes("leased")).length + (L.items.length?1:0);
    $("railcount").textContent = active + "/" + (n+1) + " active";

    $("tower").querySelectorAll(".floor").forEach(b=>{
      b.onclick = ()=> document.getElementById(b.dataset.t)?.scrollIntoView({behavior:"smooth",block:"start"});
    });
  }

  /* ── item rendering ──────────────────────── */
  function itemHTML(it, showTag){
    const src = it.url
      ? `<a class="src" href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.source||"source")} ↗</a>`
      : (it.source ? `<span class="src">${esc(it.source)}</span>` : "");
    const tag = showTag && it.tag ? `<span class="tag ${esc(it.tag)}">${esc(it.tag)}</span>` : "";
    const date = it.date ? `<span class="src">${esc(it.date)}</span>` : "";
    return `<article class="item">
      <h4>${esc(it.headline)}</h4>
      <p>${esc(it.detail)}</p>
      ${it.why ? `<div class="why">${esc(it.why)}</div>` : ""}
      <div class="foot">${tag}${date}${src}</div>
    </article>`;
  }

  /* ── main render ─────────────────────────── */
  function render(){
    const col = $("col");

    if(!state.macro && !Object.keys(state.firms).length){
  col.innerHTML = `<div class="empty">
    <h3>Today’s brief is not ready yet</h3>
    <p>The brief updates automatically at 8:00 AM ET each weekday.</p>
  </div>` + watchHTML();

  wireWatch();
  renderRail();
  return;
}
    let html = localHTML();
    html += `<div class="sect-rule"><h2>Macro</h2><span>${MACRO_SECTIONS.length} sections</span></div>`;

    if(state.macroErr){
      html += `<div class="card"><div class="err">${esc(state.macroErr)} Try pulling again.</div></div>`;
    } else if(!state.macro){
      html += MACRO_SECTIONS.map(s=>`<section class="card" id="macro-${slug(s)}">
        <div class="card-head"><h3>${esc(s)}</h3></div>
        <div class="pending">Searching</div></section>`).join("");
    } else {
      html += MACRO_SECTIONS.map(s=>{
        const sec = state.macro.sections?.find(x=>x.title===s);
        const items = sec?.items||[];
        return `<section class="card" id="macro-${slug(s)}">
          <div class="card-head"><h3>${esc(s)}</h3><span class="meta">${items.length} item${items.length===1?"":"s"}</span></div>
          ${items.length ? items.map(i=>itemHTML(i,false)).join("") : `<div class="quiet">Nothing moved here today.</div>`}
        </section>`;
      }).join("");
    }

    html += `<div class="sect-rule"><h2>Watchlist</h2><span>${state.watchlist.length} firms</span></div>`;
    html += state.watchlist.map(f=>{
      const r = state.firms[f];
      let body;
      if(!r || r.status==="pulling") body = `<div class="pending">Searching</div>`;
      else if(r.status==="error") body = `<div class="err">${esc(r.msg)}</div>`;
      else if(!r.items.length) body = `<div class="quiet">No news in the past 7 days.</div>`;
      else body = r.items.map(i=>itemHTML(i,true)).join("");
      return `<section class="card" id="firm-${slug(f)}">
        <div class="card-head">
          <h3>${esc(f)}</h3>
          <span class="meta">${r&&r.items?r.items.length+" item"+(r.items.length===1?"":"s"):""}</span>
          <button class="drop" data-drop="${esc(f)}" title="Remove ${esc(f)}">remove</button>
        </div>${body}</section>`;
    }).join("");

    html += watchHTML();
    col.innerHTML = html;

    col.querySelectorAll("[data-drop]").forEach(b=>{
      b.onclick = async ()=>{
        state.watchlist = state.watchlist.filter(f=>f!==b.dataset.drop);
        delete state.firms[b.dataset.drop];
        await save(KEY_WATCH,state.watchlist); render();
      };
    });
    wireLocal(); wireWatch(); renderRail(); renderPulse();
  }

  function localHTML(){
    const L = state.local;
    const title = L.market || "Local market";
    const sub = L.submarket ? `<span class="meta">${esc(L.submarket)}</span>` : "";

    const bar = `<div class="locbar">
      ${L.geo && !L.override ? `<span class="fix">FIX ${L.geo.lat.toFixed(3)}, ${L.geo.lng.toFixed(3)}</span>` : ""}
      <span class="hint">${L.override ? "Set by hand." : "Set from your device on every pull."}</span>
      <input id="mktin" placeholder="Or type a market — Denver, CO" value="${esc(L.override||"")}" autocomplete="off">
      <button class="btn-ghost" id="mktset">Use market</button>
      ${L.override ? `<button class="btn-ghost" id="mktclear">Use my location</button>` : ""}
    </div>`;

    let body;
    if(L.status === "locating") body = `<div class="pending">Getting your location</div>`;
    else if(L.status === "pulling") body = `<div class="pending">Searching ${esc(L.override||"your market")}</div>`;
    else if(L.status === "blocked") body = `<div class="err">${esc(L.msg)}</div>`;
    else if(L.status === "error") body = `<div class="err">${esc(L.msg)} Try pulling again.</div>`;
    else if(L.status === "idle") body = `<div class="quiet">Pull the brief and this fills with deals, leases and fundamentals where you are.</div>`;
    else if(!L.items.length) body = `<div class="quiet">Nothing reported in this market in the past two weeks.</div>`;
    else body = L.items.map(i=>itemHTML(i,true)).join("");

    const funds = L.fundamentals?.length ? `<div class="fund">${
      L.fundamentals.slice(0,4).map(f=>`<div>
        <span class="tb-label">${esc((f.note||"").split(",")[0])}</span>
        <div class="tb-value">${esc(f.value)}</div>
        <div class="tb-note">${esc(f.note||"")}</div>
      </div>`).join("")}</div>` : "";

    return `<div class="sect-rule"><h2>Site</h2><span>at grade</span></div>
      <section class="card" id="local">
        <div class="card-head"><h3>${esc(title)}</h3>${sub}</div>
        ${bar}${funds}${body}
      </section>`;
  }

  function wireLocal() {
  const inp = $("mktin");
  if (!inp) return;

  const set = async () => {
    const v = inp.value.trim();
    if (!v) return;

    state.local.override = v;
    state.local.market = v;
    state.local.geo = null;

    await save(KEY_MARKET, {
      override: v,
      market: v
    });

    render();
  };

  $("mktset").onclick = set;
  inp.onkeydown = e => {
    if (e.key === "Enter") set();
  };

  const clear = $("mktclear");

  if (clear) {
    clear.onclick = async () => {
      state.local.override = null;
      state.local.market = null;
      state.local.geo = null;

      await save(KEY_MARKET, {
        override: null,
        market: null
      });

      render();
    };
  }
}

  function watchHTML(){
    return `<div class="sect-rule"><h2>Add a firm</h2></div>
      <div class="add">
        <input id="firmin" placeholder="Brookfield, Related, Tishman Speyer…" autocomplete="off">
        <button class="btn" id="firmadd">Add floor</button>
      </div>`;
  }
  function wireWatch(){
    const inp = $("firmin"), btn = $("firmadd");
    if(!inp) return;
    const add = async ()=>{
      const v = inp.value.trim();
      if(!v || state.watchlist.some(f=>f.toLowerCase()===v.toLowerCase())) return;
      state.watchlist.push(v);
      await save(KEY_WATCH,state.watchlist);
      inp.value = "";
      render();
    };
    btn.onclick = add;
    inp.onkeydown = e => { if(e.key==="Enter") add(); };
  }

  function normalizePulse(raw){
    const fallback = [
      {key:"treasury10Y",label:"10Y UST",value:"—",note:"Awaiting market data",targetSection:"rates-debt"},
      {key:"sofr",label:"SOFR",value:"—",note:"Awaiting market data",targetSection:"rates-debt"},
      {key:"cmbs",label:"CMBS",value:"—",note:"Awaiting credit signal",targetSection:"rates-debt"},
      {key:"capRates",label:"CAP RATES",value:"—",note:"Awaiting pricing signal",targetSection:"capital-markets"}
    ];

    const source = raw || [];

    if(Array.isArray(source)){
      return fallback.map((base,i)=>{
        const item = source[i] || {};
        return {
          ...base,
          ...item,
          label:item.label || base.label,
          note:item.note || item.detail || base.note,
          targetSection:item.targetSection || base.targetSection
        };
      });
    }

    const pick = (keys,base)=>{
      const item = keys.map(k=>source?.[k]).find(Boolean) || {};
      return {
        ...base,
        ...item,
        label:item.label || base.label,
        note:item.note || item.detail || base.note,
        targetSection:item.targetSection || base.targetSection
      };
    };

    return [
      pick(["treasury10Y","tenYear","ust10Y"],fallback[0]),
      pick(["sofr"],fallback[1]),
      pick(["cmbs"],fallback[2]),
      pick(["capRates","caprates"],fallback[3])
    ];
  }

  function pulseTone(value){
    const v = String(value||"").toUpperCase();
    if(/TIGHTEN|FALLING|DOWN|LOWER|IMPROV/.test(v)) return "positive";
    if(/WIDEN|RISING|UP|HIGHER|WEAK/.test(v)) return "negative";
    if(/MIXED|VOLATILE/.test(v)) return "mixed";
    return "neutral";
  }

  function pulseTarget(item){
    const key = item?.targetSection || "capital-markets";
    const aliases = {
      "rates-debt":"macro-rates-debt",
      "rates & debt":"macro-rates-debt",
      "capital-markets":"macro-capital-markets",
      "capital markets":"macro-capital-markets",
      "office":"macro-office",
      "industrial-data-centers":"macro-industrial-data-centers",
      "industrial & data centers":"macro-industrial-data-centers",
      "multifamily-retail":"macro-multifamily-retail",
      "multifamily & retail":"macro-multifamily-retail"
    };
    return aliases[String(key).toLowerCase()] || "macro-capital-markets";
  }

  function openPulseTarget(item){
    const target = document.getElementById(pulseTarget(item));
    if(!target) return;
    target.scrollIntoView({behavior:"smooth",block:"start"});
    target.classList.remove("section-flash");
    void target.offsetWidth;
    target.classList.add("section-flash");
    setTimeout(()=>target.classList.remove("section-flash"),1400);
  }

  function renderPulse(){
    const data = normalizePulse(state.pulse);
    state.pulse = data;

    const snapshot = $("marketSnapshot");
    if(snapshot){
      snapshot.innerHTML = data.map((item,i)=>`
        <button
          type="button"
          class="market-line"
          data-pulse-index="${i}"
          data-tone="${pulseTone(item.value)}"
          aria-label="Open supporting analysis for ${esc(item.label)}"
        >
          <span class="market-code">${esc(item.label)}</span>
          <span class="market-value">${esc(item.value || "—")}</span>
          <span class="market-note">${esc(item.note || item.detail || "")}</span>
        </button>
      `).join("");

      snapshot.querySelectorAll("[data-pulse-index]").forEach(button=>{
        button.onclick = ()=>openPulseTarget(data[Number(button.dataset.pulseIndex)]);
      });
    }

    $("sub").textContent = dateLong;
  }

  /* ── pulling ─────────────────────────────── */
  async function pullFirm(firm){
    state.firms[firm] = {status:"pulling",items:[]};
    render();
    try{
      const d = await ask(firmPrompt(firm));
      state.firms[firm] = {status:"done", items:Array.isArray(d.items)?d.items:[]};
    }catch(e){
      state.firms[firm] = {status:"error", items:[], msg:"Couldn't reach the news for "+firm+". "+e.message};
    }
    render();
  }



  /* ── copy out ────────────────────────────── */
  $("copy").onclick = ()=>{
    let t = "CRE DAILY BRIEF — " + dateLong + "\n\n";
    const pulse = normalizePulse(state.pulse);
    if(pulse.length){
      t += "TAPE: " + pulse
        .map(p=>p.label+" "+(p.value||"—")+" ("+(p.note||p.detail||"")+")")
        .join(" | ") + "\n\n";
    }
    const L = state.local;
    if(L.items?.length){
      t += (L.market||"LOCAL MARKET").toUpperCase() + (L.submarket?" — "+L.submarket:"") + "\n";
      if(L.fundamentals?.length) t += "  " + L.fundamentals.map(f=>f.value+" "+(f.note||"")).join(" | ") + "\n";
      L.items.forEach(i=> t += "  • "+i.headline+" — "+i.detail+(i.url?" "+i.url:"")+"\n");
      t += "\n";
    }
    (state.macro?.sections||[]).forEach(s=>{
      if(!s.items?.length) return;
      t += s.title.toUpperCase()+"\n";
      s.items.forEach(i=> t += "  • "+i.headline+" — "+i.detail+(i.why?" ["+i.why+"]":"")+(i.url?" "+i.url:"")+"\n");
      t += "\n";
    });
    state.watchlist.forEach(f=>{
      const r = state.firms[f];
      if(!r?.items?.length) return;
      t += f.toUpperCase()+"\n";
      r.items.forEach(i=> t += "  • "+i.headline+" — "+i.detail+(i.url?" "+i.url:"")+"\n");
      t += "\n";
    });
    navigator.clipboard.writeText(t.trim());
    $("copy").textContent = "Copied";
    setTimeout(()=>$("copy").textContent = "Copy", 1400);
  };


  /* ── bridge to the  layer ─────────────── */
  // Lets the subscribe call send your real watchlist + market to the cron,
  // and lets a ed brief render without re-running every search.
  window.__creState = () => state;
  window.__creLoad = async brief => {
  state.macro = brief.macro || null;
  state.pulse = brief.marketPulse || brief.pulse || brief.macro?.pulse || [];
  state.firms = brief.firms || {};

  if (brief.local) {
    Object.assign(state.local, brief.local, {
      status: brief.local.items?.length ? "done" : "idle"
    });
  }

  await save(KEY_BRIEF, {
    date: brief.date || dateISO,
    macro: state.macro,
    pulse: state.pulse,
    marketPulse: state.pulse,
    firms: state.firms,
    local: state.local
  });

  renderPulse();
  render();
};

  /* ── boot ────────────────────────────────── */
  (async function(){
    const w = await load(KEY_WATCH);
    if(Array.isArray(w) && w.length) state.watchlist = w;
    const m = await load(KEY_MARKET);
    if(m && m.override) state.local.override = m.override;

    const b = await load(KEY_BRIEF);

// Always display the most recently saved brief.
// It stays visible until the server provides a newer one.
if (b) {
  state.macro = b.macro || null;
  state.pulse = b.marketPulse || b.pulse || b.macro?.pulse || [];
  state.firms = b.firms || {};

  if (b.local) {
    state.local = Object.assign(state.local, b.local, {
      status: b.local.items?.length ? "done" : "idle"
    });
  }

  renderPulse();
}

render();
  })();
})();
</script>
<script>
/* ── Push: the part that makes this work with the app closed ── */
(function(){
  const KEY_SUB = "cre-stack:subid";
  const btn = document.getElementById("notify");
  let reg = null;

  const supported = "serviceWorker" in navigator && "PushManager" in window && "Notification" in window;

  function b64ToU8(base64){
    const pad = "=".repeat((4 - base64.length % 4) % 4);
    const raw = atob((base64 + pad).replace(/-/g,"+").replace(/_/g,"/"));
    return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
  }

  // Push the current watchlist + market up so the 6:30am job builds YOUR brief.
  window.syncSub = async function(){
    if(!reg) return;
    const sub = await reg.pushManager.getSubscription();
    if(!sub) return;
    const st = window.__creState ? window.__creState() : {};
    await fetch("/api/subscribe",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        subscription: sub,
        watchlist: st.watchlist || [],
        geo: st.local?.geo || null,
        market: st.local?.override || st.local?.market || null
      })
    }).catch(()=>{});
  };

  function setLabel(state){
    if(!btn) return;
    btn.textContent = state;
    btn.classList.toggle("armed", state === "Notifying");
  }

  async function enable() {
  try {
    if (!supported) {
      setLabel("No push here");
      alert("This browser does not support web push notifications.");
      return;
    }

    setLabel("Setting up…");

    // Ensure that the service worker is ready before subscribing.
    if (!reg) {
      reg = await navigator.serviceWorker.register("/sw.js");
      await navigator.serviceWorker.ready;
    }

    const permission = await Notification.requestPermission();

    if (permission !== "granted") {
      setLabel("Blocked");
      alert("Notifications were not allowed. Check Chrome's site permissions.");
      return;
    }

    const keyResponse = await fetch("/api/key");

    if (!keyResponse.ok) {
      throw new Error(
        `Could not retrieve notification key (${keyResponse.status})`
      );
    }

    const { key } = await keyResponse.json();

    const subscription = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: b64ToU8(key)
    });

    const st = window.__creState
      ? window.__creState()
      : {};

    const response = await fetch("/api/subscribe", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        subscription,
        watchlist: st.watchlist || [],
        geo: st.local?.geo || null,
        market:
          st.local?.override ||
          st.local?.market ||
          null
      })
    });

    if (!response.ok) {
      throw new Error(
        `Subscription request failed (${response.status})`
      );
    }

    const { id } = await response.json();

    localStorage.setItem(KEY_SUB, id);
    setLabel("Notifying");

    new Notification("CRE Brief notifications enabled", {
      body: "Your scheduled daily brief is now active.",
      icon: "/icon-192.png"
    });
  } catch (error) {
    console.error("Notification setup failed:", error);
    setLabel("Try again");
    alert(`Notification setup failed: ${error.message}`);
  }
}

async function disable() {
  try {
    if (!reg) {
      reg = await navigator.serviceWorker.ready;
    }

    const subscription =
      await reg.pushManager.getSubscription();

    if (subscription) {
      await fetch("/api/unsubscribe", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          endpoint: subscription.endpoint
        })
      }).catch(() => {});

      await subscription.unsubscribe();
    }

    localStorage.removeItem(KEY_SUB);
    setLabel("Notify");
  } catch (error) {
    console.error("Notification disable failed:", error);
    setLabel("Try again");
    alert(`Notification error: ${error.message}`);
  }
}

if (btn) {
  btn.addEventListener("click", async () => {
    try {
      if (!reg) {
        reg = await navigator.serviceWorker.ready;
      }

      const subscription =
        await reg.pushManager.getSubscription();

      if (subscription) {
        await disable();
      } else {
        await enable();
      }
    } catch (error) {
      console.error("Notify button failed:", error);
      setLabel("Try again");
      alert(`Notification error: ${error.message}`);
    }
  });
}

if (supported) {
  navigator.serviceWorker
    .register("/sw.js")
    .then(async registration => {
      reg = registration;

      await navigator.serviceWorker.ready;

      const subscription =
        await registration.pushManager.getSubscription();

      setLabel(
        subscription &&
        Notification.permission === "granted"
          ? "Notifying"
          : "Notify"
      );

      if (subscription) {
        await window.syncSub();
      }
    })
    .catch(error => {
      console.error(
        "Service-worker registration failed:",
        error
      );

      setLabel("Try again");
    });
} else {
  setLabel("No push here");
}

  // If the cron already built today's brief, show that instead of re-searching.
  window.addEventListener("load", async () => {
  const id = localStorage.getItem(KEY_SUB);

  if (!id) {
    return;
  }

  try {
    const res = await fetch("/api/brief/" + id);

    if (!res.ok) {
      return;
    }

    const brief = await res.json();

    if (window.__creLoad) {
      await window.__creLoad(brief);
    }
  } catch (error) {
    console.error("Could not load stored brief:", error);
  }
});
})();
</script>
</body>
